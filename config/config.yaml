target: target
cutoff_date: 2024-9-28
# Alternative: time-relative holdout (mutually exclusive with cutoff_date).
# Last N days of data become holdout; cutoff = max(window_end) - N days.
# holdout_days: 365

use_predictions:
  cwe: false
  cvss: false

feature_columns:
  cwe_features:
    - predicted_cwe_list  
    - cwe_list
  passthrough:
    - days_since_published
    - days_since_modified
    - total_mentions
    - days_since_last_mention
    - mentions_in_window
    - mention_frequency
    - observations_in_window
    - total_count_in_window
    - has_observations
    - ref_exploit
    - ref_patch
    - ref_vendor_advisory
    - ref_us_government_resource
    - ref_third_party_advisory
    - ref_vdb_entry
    - ref_product
    - ref_mailing_list
    - ref_not_applicable
    - ref_release_notes
    - ref_issue_tracking
    - ref_technical_description
    - ref_mitigation
    - ref_permissions_required
    - ref_press_media_coverage
    # Sighting features (from data/raw/cve_sighting_features.csv)
    - n_poc_1d
    - n_poc_7d
    - n_poc_30d
    - n_confirmed_1d
    - n_confirmed_7d
    - n_confirmed_30d
    - n_exploited_nonss_1d
    - n_exploited_nonss_7d
    - n_exploited_nonss_30d
    - telegram_poc_30d
    - cum_poc
    - cum_confirmed
    - cum_exploited_nonss
    - nuclei_template_present
    - exploitdb_present
    - kev_listed
    - unique_poc_sources_30d
    - days_since_first_poc
    - days_since_first_confirmed
    - days_since_first_exploited_nonss
    - days_first_confirmed_minus_first_poc
    - days_first_exploited_nonss_minus_first_poc
  categorical_features:
    - cna_id
    - attack_vector
    - attack_complexity
    - privileges_required
    - user_interaction
    - scope
    - confidentiality_impact
    - integrity_impact
    - availability_impact
    - predicted_attack_vector
    - predicted_attack_complexity
    - predicted_privileges_required
    - predicted_user_interaction
    - predicted_scope
    - predicted_confidentiality_impact
    - predicted_integrity_impact
    - predicted_availability_impact

xgboost:
  tree_method: hist
  enable_categorical: true
  max_cat_to_onehot: 4
  device: cpu
  random_state: 42

calibration:
  enabled: true
  method: isotonic
  slice_days: 60